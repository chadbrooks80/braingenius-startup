<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BrainGenius Sign-In Modal — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>

<style>
/* ─── DEMO PAGE (simulates the existing website underneath) ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #f1f5f9;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1.5rem;
  padding: 2rem;
}
.demo-label {
  font-size: 0.8rem; color: #94a3b8; letter-spacing: 0.1em; text-transform: uppercase;
}
.demo-open-btn {
  font-family: 'Baloo 2', cursive;
  font-size: 1rem; font-weight: 800;
  background: linear-gradient(135deg, #0f172a, #1e3a5f);
  color: #fff;
  border: none; border-radius: 100px;
  padding: 0.8rem 2rem; cursor: pointer;
  box-shadow: 0 8px 28px rgba(15,23,42,0.25);
  transition: transform 0.2s, box-shadow 0.2s;
}
.demo-open-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(15,23,42,0.35); }

/* ─────────────────────────────────────────────
   MODAL  — paste everything below into your site
   ───────────────────────────────────────────── */
:root {
  --bg-cyan: #22d3ee;
  --bg-lime: #a3e635;
  --bg-navy: #0f172a;
  --bg-ink:  #1e293b;
  --bg-muted:#64748b;
  --bg-white:#ffffff;
}

/* Overlay */
.bg-modal-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  opacity: 0; visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}
.bg-modal-overlay.open {
  opacity: 1; visibility: visible;
}

/* Card */
.bg-modal-card {
  position: relative;
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,0.97);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 1.75rem;
  padding: 2rem 2rem 1.6rem;
  box-shadow:
    0 32px 80px rgba(0,0,0,0.35),
    0 0 0 1px rgba(255,255,255,0.15);
  transform: translateY(24px) scale(0.97);
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
}
.bg-modal-overlay.open .bg-modal-card {
  transform: translateY(0) scale(1);
}

/* Close button */
.bg-modal-close {
  position: absolute; top: 1rem; right: 1rem;
  width: 32px; height: 32px;
  background: rgba(15,23,42,0.07);
  border: none; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--bg-muted);
  transition: background 0.18s, color 0.18s, transform 0.18s;
}
.bg-modal-close:hover {
  background: rgba(15,23,42,0.13);
  color: var(--bg-ink);
  transform: rotate(90deg);
}
.bg-modal-close svg { display: block; }

/* Title */
.bg-card-title {
  font-family: 'Baloo 2', cursive;
  font-size: 1.65rem; font-weight: 900; color: var(--bg-navy);
  line-height: 1.1; letter-spacing: -0.025em;
  margin-bottom: 0.25rem;
}
.bg-card-title .bg-accent {
  background: linear-gradient(135deg, var(--bg-cyan), var(--bg-lime));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.bg-card-sub {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.87rem; color: var(--bg-muted); line-height: 1.55;
  margin-bottom: 1.2rem;
}

/* Google button */
.bg-btn-google {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 0.7rem;
  background: var(--bg-white);
  border: 1.5px solid rgba(15,23,42,0.14);
  border-radius: 100px;
  padding: 0.7rem 1.5rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.92rem; font-weight: 600; color: var(--bg-ink);
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(15,23,42,0.08);
  transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
  text-decoration: none;
}
.bg-btn-google:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(15,23,42,0.13);
  border-color: rgba(34,211,238,0.5);
}
.bg-google-icon { width: 18px; height: 18px; flex-shrink: 0; }

/* Divider */
.bg-divider {
  display: flex; align-items: center; gap: 0.9rem;
  margin: 0.9rem 0;
}
.bg-divider::before, .bg-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(15,23,42,0.12), transparent);
}
.bg-divider span {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.73rem; font-weight: 600; color: var(--bg-muted);
  letter-spacing: 0.08em; text-transform: uppercase;
}

/* Form */
.bg-form-group { margin-bottom: 0.8rem; }
.bg-form-label {
  display: block;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.79rem; font-weight: 600; color: var(--bg-ink);
  margin-bottom: 0.32rem;
}
.bg-input-wrap { position: relative; }

.bg-input-icon {
  position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
  color: var(--bg-muted); pointer-events: none;
  display: flex; align-items: center;
  transition: color 0.2s;
}
.bg-input-wrap:focus-within .bg-input-icon { color: #0e7490; }

.bg-form-input {
  width: 100%;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: rgba(255,255,255,0.75);
  border: 1.5px solid rgba(15,23,42,0.12);
  border-radius: 0.8rem;
  padding: 0.7rem 0.9rem 0.7rem 2.45rem;
  font-size: 0.9rem; color: var(--bg-ink);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.bg-form-input::placeholder { color: #94a3b8; }
.bg-form-input:focus {
  border-color: var(--bg-cyan);
  background: rgba(255,255,255,0.98);
  box-shadow: 0 0 0 3px rgba(34,211,238,0.15);
}
.bg-form-input.has-toggle { padding-right: 2.6rem; }

/* Eye toggle */
.bg-pw-toggle {
  position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%);
  background: rgba(15,23,42,0.05);
  border: none; border-radius: 6px; cursor: pointer;
  color: var(--bg-muted); padding: 0.28rem;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s, background 0.2s;
}
.bg-pw-toggle:hover { color: var(--bg-ink); background: rgba(34,211,238,0.15); }

/* Remember / Forgot row */
.bg-form-meta {
  display: flex; align-items: center; justify-content: space-between;
  margin: -0.1rem 0 1rem;
}
.bg-remember {
  display: flex; align-items: center; gap: 0.4rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.79rem; color: var(--bg-muted); cursor: pointer;
}
.bg-remember input[type="checkbox"] {
  accent-color: var(--bg-cyan); width: 14px; height: 14px; cursor: pointer;
}
.bg-forgot {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.79rem; font-weight: 600; color: #0e7490; text-decoration: none;
  transition: color 0.2s;
}
.bg-forgot:hover { color: var(--bg-cyan); }

/* Submit */
.bg-btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--bg-navy) 0%, #1e3a5f 100%);
  color: var(--bg-white);
  font-family: 'Baloo 2', cursive; font-size: 0.97rem; font-weight: 800;
  padding: 0.8rem 2rem; border-radius: 100px; border: none; cursor: pointer;
  box-shadow: 0 8px 28px rgba(15,23,42,0.28);
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.bg-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(15,23,42,0.36); }
.bg-btn-primary:active { transform: translateY(0); }

/* Signup nudge */
.bg-signup-nudge {
  font-family: 'Plus Jakarta Sans', sans-serif;
  text-align: center; margin-top: 0.9rem;
  font-size: 0.84rem; color: var(--bg-muted);
}
.bg-signup-nudge a {
  font-weight: 700; color: #0e7490; text-decoration: none; transition: color 0.2s;
}
.bg-signup-nudge a:hover { color: var(--bg-cyan); }

/* Trust chips */
.bg-trust-chips {
  display: flex; align-items: center; justify-content: center; gap: 1rem;
  margin-top: 0.9rem; flex-wrap: wrap;
}
.bg-trust-chip {
  display: flex; align-items: center; gap: 0.32rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.7rem; font-weight: 600; color: var(--bg-muted);
}
.bg-trust-chip .chip-icon { color: #0e7490; display: flex; align-items: center; }
</style>
</head>
<body>

<!-- DEMO: fake page content underneath -->
<p class="demo-label">Your existing website</p>
<button class="demo-open-btn" onclick="openSignIn()">Sign In to BrainGenius</button>

<!-- ════════════════════════════════════════════
     MODAL — copy from here to end of file into your site
     ════════════════════════════════════════════ -->
<div class="bg-modal-overlay" id="bgModalOverlay" onclick="handleOverlayClick(event)">
  <div class="bg-modal-card" id="bgModalCard">

    <!-- Close X -->
    <button class="bg-modal-close" onclick="closeSignIn()" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="1" y1="1" x2="13" y2="13"/>
        <line x1="13" y1="1" x2="1" y2="13"/>
      </svg>
    </button>

    <h2 class="bg-card-title">Sign in to <span class="bg-accent">BrainGenius</span></h2>
    <p class="bg-card-sub">Continue your vocabulary journey. Your streak is waiting.</p>

    <!-- Google -->
    <a href="#" class="bg-btn-google">
      <svg class="bg-google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>

    <div class="bg-divider"><span>or</span></div>

    <!-- Email -->
    <div class="bg-form-group">
      <label class="bg-form-label" for="bgEmail">Email or User ID</label>
      <div class="bg-input-wrap">
        <span class="bg-input-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </span>
        <input class="bg-form-input" type="text" id="bgEmail" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="bg-form-group">
      <label class="bg-form-label" for="bgPassword">Password</label>
      <div class="bg-input-wrap">
        <span class="bg-input-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input class="bg-form-input has-toggle" type="password" id="bgPassword" placeholder="Your password" autocomplete="current-password"/>
        <button class="bg-pw-toggle" type="button" onclick="bgTogglePassword()" aria-label="Show password">
          <svg id="bgEyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Remember / Forgot -->
    <div class="bg-form-meta">
      <label class="bg-remember">
        <input type="checkbox"/> Remember me
      </label>
      <a href="#" class="bg-forgot">Forgot password?</a>
    </div>

    <!-- Submit -->
    <button class="bg-btn-primary" type="button">
      Sign in with Credentials
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

    <p class="bg-signup-nudge">New here? <a href="#">Create a free account →</a></p>

    <div class="bg-trust-chips">
      <span class="bg-trust-chip">
        <span class="chip-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </span>
        Secure &amp; encrypted
      </span>
      <span class="bg-trust-chip">
        <span class="chip-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        No credit card
      </span>
      <span class="bg-trust-chip">
        <span class="chip-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </span>
        Free to start
      </span>
    </div>

  </div>
</div>

<script>
/* ── Modal open / close ── */
function openSignIn() {
  document.getElementById('bgModalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSignIn() {
  document.getElementById('bgModalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('bgModalOverlay')) closeSignIn();
}

/* Escape key closes */
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSignIn(); });

/* ── Password toggle ── */
const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

function bgTogglePassword() {
  const input = document.getElementById('bgPassword');
  const icon  = document.getElementById('bgEyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = eyeClosed;
  } else {
    input.type = 'password';
    icon.innerHTML = eyeOpen;
  }
}
</script>
</body>
</html>
